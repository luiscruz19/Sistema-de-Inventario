# Infraestructura compartida del proyecto Inventario.
# Levanta primero esto (crea la red net-shared) y luego docker-compose.yml.
#   docker compose -f docker-compose.infra.yml up -d
services:
    ###### MySQL ######
    mysql:
        image: mysql:8.0
        container_name: inventario_mysql
        restart: always
        command: --default-authentication-plugin=mysql_native_password
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
            TZ: America/Argentina/Buenos_Aires
        ports:
            - "${DB_PORT_HOST:-3307}:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./infra/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-secret}"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 30s
        networks:
            - net-shared

    ###### Traefik (reverse proxy) ######
    traefik:
        image: traefik:v3.1
        container_name: inventario_traefik
        restart: always
        command:
            - "--providers.docker=true"
            - "--providers.docker.exposedbydefault=false"
            - "--providers.docker.network=net-shared"
            - "--entrypoints.web.address=:80"
            - "--api.dashboard=true"
            - "--api.insecure=true"
        ports:
            - "${HTTP_PORT:-80}:80"
            - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - net-shared

volumes:
    mysql_data:

networks:
    net-shared:
        external: true
