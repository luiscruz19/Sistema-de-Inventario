services:
  ###### BACKOFFICE (Panel de gestión de inventario) ######
  inventario_backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile.development
    container_name: inventario_backoffice
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-shared"
      - "traefik.http.routers.inventario_backoffice.rule=Host(`inventario.localhost`) && PathPrefix(`/`)"
      - "traefik.http.routers.inventario_backoffice.priority=10"
      - "traefik.http.services.inventario_backoffice.loadbalancer.server.port=80"
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 80
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - ./backoffice:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - net-shared

  ##----------------------------------------------
  ##        SERVICIOS CORE (internos, sin Traefik)
  ##----------------------------------------------

  ###### AUTH (autenticación JWT) ######
  inventario_auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile.development
    container_name: inventario_auth
    restart: always
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    networks:
      - net-shared

  ###### MAILER (envío de emails SMTP) ######
  inventario_mailer:
    build:
      context: ./services/mailer
      dockerfile: Dockerfile.development
    container_name: inventario_mailer
    restart: always
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./services/mailer:/app
      - /app/node_modules
    networks:
      - net-shared

networks:
  net-shared:
    external: true
